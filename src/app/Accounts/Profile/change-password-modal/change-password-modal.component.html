<div class="modal-content siteColor change-password-modal">
  <form (ngSubmit)="submitChangePassword()" [formGroup]="changePasswordForm" autocomplete="off">
    <div class="modal-header">
      <div class="change-password-heading">
        <p class="modal-title">{{ modalTitle }}</p>
        <p class="change-password-hint" *ngIf="!hasPassword">
          No password yet — set one to enable password login.
        </p>
        <p class="change-password-hint" *ngIf="hasPassword">
          Enter your current password, then choose a new one.
        </p>
      </div>
      <div type="button" class="close" (click)="bsModalRef.hide()" aria-label="Close">
        <i class="bi bi-x-circle-fill"></i>
      </div>
    </div>

    <div class="modal-body">
      <div class="form-group" *ngIf="hasPassword">
        <label>Current Password*</label>
        <div class="password-field">
          <input
            [type]="showCurrentPassword ? 'text' : 'password'"
            formControlName="currentPassword"
            class="form-control"
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle" (click)="toggleCurrentPassword()" tabindex="-1">
            <i class="bi" [ngClass]="showCurrentPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger" *ngIf="changePasswordForm.get('currentPassword')?.invalid && (submitted || changePasswordForm.get('currentPassword')?.touched)">
          Current password is required
        </div>
      </div>

      <div class="form-group">
        <label>New Password*</label>
        <div class="password-field">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            formControlName="changePassword"
            class="form-control"
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" (click)="toggleNewPassword()" tabindex="-1">
            <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger" *ngIf="changePasswordForm.get('changePassword')?.invalid && (submitted || changePasswordForm.get('changePassword')?.touched)">
          <span *ngIf="changePasswordForm.get('changePassword')?.errors?.['required']">New password is required</span>
          <span *ngIf="changePasswordForm.get('changePassword')?.errors?.['minlength']">Minimum 4 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password*</label>
        <div class="password-field">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            class="form-control"
            autocomplete="new-password"
          />
          <button type="button" class="password-toggle" (click)="toggleConfirmPassword()" tabindex="-1">
            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger" *ngIf="changePasswordForm.get('confirmPassword')?.invalid && (submitted || changePasswordForm.get('confirmPassword')?.touched)">
          Confirm password is required
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button type="submit" class="btn siteBtnbackground" [disabled]="saving">
        {{ submitLabel }}
      </button>
    </div>
  </form>
</div>
