<div class="modal-content siteColor change-password-modal">
  <form (ngSubmit)="submitChangePassword()" [formGroup]="changePasswordForm" autocomplete="off">
    <div class="modal-header change-password-header">
      <p class="modal-title">{{ modalTitle }}</p>
      <button type="button" class="close modal-chrome-btn modal-chrome-btn-close" (click)="bsModalRef.hide()" aria-label="Close">
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="change-password-banner" [class.change-password-banner--set]="!hasPassword">
        <i class="bi" [ngClass]="hasPassword ? 'bi-shield-lock' : 'bi-key'" aria-hidden="true"></i>
        <p *ngIf="!hasPassword">No password yet — set one to enable password login.</p>
        <p *ngIf="hasPassword">Enter your current password, then choose a new one.</p>
      </div>

      <div class="form-group" *ngIf="hasPassword">
        <label>Current Password*</label>
        <div class="password-field">
          <input
            [type]="showCurrentPassword ? 'text' : 'password'"
            formControlName="currentPassword"
            class="form-control"
            autocomplete="current-password"
            placeholder="Current password"
          />
          <button type="button" class="password-toggle" (click)="toggleCurrentPassword()" tabindex="-1" aria-label="Show current password">
            <i class="bi" [ngClass]="showCurrentPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger" *ngIf="changePasswordForm.get('currentPassword')?.invalid && (submitted || changePasswordForm.get('currentPassword')?.touched)">
          Current password is required
        </div>
      </div>

      <div class="form-group">
        <label>New Password*</label>
        <div class="password-field">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            formControlName="changePassword"
            class="form-control"
            autocomplete="new-password"
            placeholder="At least 4 characters"
          />
          <button type="button" class="password-toggle" (click)="toggleNewPassword()" tabindex="-1" aria-label="Show new password">
            <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger" *ngIf="changePasswordForm.get('changePassword')?.invalid && (submitted || changePasswordForm.get('changePassword')?.touched)">
          <span *ngIf="changePasswordForm.get('changePassword')?.errors?.['required']">New password is required</span>
          <span *ngIf="changePasswordForm.get('changePassword')?.errors?.['minlength']">Minimum 4 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password*</label>
        <div class="password-field">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            class="form-control"
            autocomplete="new-password"
            placeholder="Re-enter new password"
          />
          <button type="button" class="password-toggle" (click)="toggleConfirmPassword()" tabindex="-1" aria-label="Show confirm password">
            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="text-danger" *ngIf="changePasswordForm.get('confirmPassword')?.invalid && (submitted || changePasswordForm.get('confirmPassword')?.touched)">
          Confirm password is required
        </div>
      </div>
    </div>

    <div class="modal-footer change-password-footer">
      <button type="button" class="btn change-password-cancel" (click)="bsModalRef.hide()" [disabled]="saving">
        Cancel
      </button>
      <button type="submit" class="btn siteBtnbackground change-password-submit" appSingleClick [disabled]="saving">
        {{ submitLabel }}
      </button>
    </div>
  </form>
</div>
