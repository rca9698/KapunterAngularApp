<section class="profile-shell">
  <div class="profile-card">
    <div class="profile-head">
      <h2>My Account</h2>
      <p>Account profile and quick access settings.</p>
    </div>

    <div class="profile-loading" *ngIf="loading">
      <app-kapunter-loader message="Loading profile…"></app-kapunter-loader>
    </div>

    <div class="profile-error text-warning" *ngIf="!loading && loadError">
      {{ loadError }}
      <button type="button" class="btn btn-link btn-sm" (click)="loadProfile()">Retry</button>
    </div>

    <div class="profile-grid" *ngIf="!loading">
      <div class="profile-item">
        <span>Mobile Number</span>
        <strong>{{ authService.displayUserNumber }}</strong>
      </div>
      <div class="profile-item">
        <span>Date of joining</span>
        <strong><i class="bi bi-calendar-date"></i> {{ formatJoinDate(authService.userdetail.createdDate) }}</strong>
      </div>
    </div>

    <div class="profile-actions" *ngIf="!loading">
      <div class="profile-appearance">
        <span class="profile-appearance-label">Appearance</span>
        <div class="profile-theme-options" role="group" aria-label="Theme preference">
          <button
            type="button"
            class="profile-theme-btn"
            [class.active]="themeService.current === 'dark'"
            (click)="setTheme('dark')"
          >
            <i class="bi bi-moon-stars-fill"></i> Dark
          </button>
          <button
            type="button"
            class="profile-theme-btn"
            [class.active]="themeService.current === 'light'"
            (click)="setTheme('light')"
          >
            <i class="bi bi-sun-fill"></i> Light
          </button>
        </div>
      </div>
      <button type="button" class="btn siteBtnbackground" (click)="openChangePasswordModal()">
        {{ authService.userdetail?.hasPassword ? 'Change Password' : 'Set Password' }}
      </button>
    </div>
  </div>
</section>
