<section class="feature-shell">
  <div class="feature-card form-preview-card">
    <h2>Register Account</h2>
    <p>Create a new account to access all wallet and site features.</p>

    <div class="form-preview">
      <div class="form-preview-row">
        <label>Mobile Number</label>
        <input type="text" class="form-control" placeholder="Enter mobile number" disabled>
      </div>
      <div class="form-preview-row">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Enter password" disabled>
      </div>
      <div class="form-preview-row">
        <label>Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm password" disabled>
      </div>
      <button class="btn siteBtnbackground">Create Account</button>
    </div>
  </div>
</section>
