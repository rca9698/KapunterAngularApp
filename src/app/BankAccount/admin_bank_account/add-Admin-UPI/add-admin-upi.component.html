<div class="modal-header admin-pay-modal-header">
  <div>
    <p class="modal-title mb-0">Admin UPI detail</p>
    <p class="admin-pay-modal-site" *ngIf="siteName">{{ siteName }}</p>
  </div>
  <button type="button" class="admin-pay-modal-close" (click)="bsModalRef.hide()" aria-label="Close">
    <i class="bi bi-x-lg"></i>
  </button>
</div>

<div class="admin-pay-modal-body">
  <form (ngSubmit)="AddAdminUpi()" [formGroup]="addAdminUpiForm" autocomplete="off">
    <div class="admin-pay-field">
      <label for="UpiName">UPI name*</label>
      <input id="UpiName" class="admin-pay-input" type="text" formControlName="UpiName" placeholder="UPI name" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminUpiForm.get('UpiName')?.invalid && (submitted || addAdminUpiForm.get('UpiName')?.touched)">
        <span *ngIf="addAdminUpiForm.get('UpiName')?.errors?.['required']">UPI name is required</span>
      </div>
    </div>

    <div class="admin-pay-field">
      <label for="UpiId">UPI ID*</label>
      <input id="UpiId" class="admin-pay-input" type="text" formControlName="UpiId" placeholder="example@upi" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminUpiForm.get('UpiId')?.invalid && (submitted || addAdminUpiForm.get('UpiId')?.touched)">
        <span *ngIf="addAdminUpiForm.get('UpiId')?.errors?.['required']">UPI ID is required</span>
      </div>
    </div>

    <button class="admin-pay-modal-submit" type="submit">Add UPI detail</button>
  </form>
</div>
