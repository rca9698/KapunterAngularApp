<div class="modal-header admin-pay-modal-header">
  <div>
    <p class="modal-title mb-0">Add admin QR</p>
    <p class="admin-pay-modal-site" *ngIf="siteName">{{ siteName }}</p>
  </div>
  <button type="button" class="close modal-chrome-btn modal-chrome-btn-close admin-pay-modal-close" (click)="bsModalRef.hide()" aria-label="Close">
    <i class="bi bi-x-lg" aria-hidden="true"></i>
  </button>
</div>

<div class="admin-pay-modal-body">
  <form (ngSubmit)="AddAdminQR()" [formGroup]="addAdminQrForm" autocomplete="off">
    <div class="admin-pay-field">
      <label for="QRName">QR name*</label>
      <input id="QRName" class="admin-pay-input" type="text" formControlName="QRName" placeholder="QR name" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminQrForm.get('QRName')?.invalid && (submitted || addAdminQrForm.get('QRName')?.touched)">
        <span *ngIf="addAdminQrForm.get('QRName')?.errors?.['required']">QR name is required</span>
      </div>
    </div>

    <div class="admin-pay-field">
      <label class="kp-file-upload">
        <span class="kp-file-upload-ui">
          <i class="bi bi-cloud-arrow-up kp-file-upload-icon" aria-hidden="true"></i>
          <span class="kp-file-upload-title">Choose QR image</span>
          <span class="kp-file-upload-hint">JPG or PNG</span>
          <span class="kp-file-upload-name" *ngIf="selectedFileName">{{ selectedFileName }}</span>
        </span>
        <input class="kp-file-upload-input" #imageInput type="file" accept="image/*" (change)="processFile(imageInput)">
      </label>
      <div class="text-danger" *ngIf="!file && submitted">
        <span>File is required</span>
      </div>
    </div>

    <button class="admin-pay-modal-submit" type="submit" appSingleClick>Add QR</button>
  </form>
</div>
