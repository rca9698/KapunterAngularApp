<div class="modal-header admin-pay-modal-header">
  <div>
    <p class="modal-title mb-0">Admin bank account</p>
    <p class="admin-pay-modal-site" *ngIf="siteName">{{ siteName }}</p>
  </div>
  <button type="button" class="admin-pay-modal-close" (click)="bsModalRef.hide()" aria-label="Close">
    <i class="bi bi-x-lg"></i>
  </button>
</div>

<div class="admin-pay-modal-body">
  <form (ngSubmit)="AddAdminBankAccount()" [formGroup]="addAdminBankAccountForm" autocomplete="off">
    <div class="admin-pay-field">
      <label for="BName">Bank name*</label>
      <input id="BName" class="admin-pay-input" type="text" formControlName="BName" placeholder="Bank name" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminBankAccountForm.get('BName')?.invalid && (submitted || addAdminBankAccountForm.get('BName')?.touched)">
        <span *ngIf="addAdminBankAccountForm.get('BName')?.errors?.['required']">Bank name is required</span>
      </div>
    </div>

    <div class="admin-pay-field">
      <label for="AHName">Account holder name*</label>
      <input id="AHName" class="admin-pay-input" type="text" formControlName="AHName" placeholder="Account holder name" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminBankAccountForm.get('AHName')?.invalid && (submitted || addAdminBankAccountForm.get('AHName')?.touched)">
        <span *ngIf="addAdminBankAccountForm.get('AHName')?.errors?.['required']">Account holder name is required</span>
      </div>
    </div>

    <div class="admin-pay-field">
      <label for="ANumber">Account number*</label>
      <input id="ANumber" class="admin-pay-input" type="text" formControlName="ANumber" placeholder="Account number" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminBankAccountForm.get('ANumber')?.invalid && (submitted || addAdminBankAccountForm.get('ANumber')?.touched)">
        <span *ngIf="addAdminBankAccountForm.get('ANumber')?.errors?.['required']">Account number is required</span>
      </div>
    </div>

    <div class="admin-pay-field">
      <label for="IFSCCode">IFSC code*</label>
      <input id="IFSCCode" class="admin-pay-input" type="text" formControlName="IFSCCode" placeholder="IFSC code" autocomplete="off">
      <div class="text-danger" *ngIf="addAdminBankAccountForm.get('IFSCCode')?.invalid && (submitted || addAdminBankAccountForm.get('IFSCCode')?.touched)">
        <span *ngIf="addAdminBankAccountForm.get('IFSCCode')?.errors?.['required']">IFSC code is required</span>
      </div>
    </div>

    <button class="admin-pay-modal-submit" type="submit">Add bank account</button>
  </form>
</div>
