<section class="admin-pay-shell">
  <header class="admin-pay-header">
    <div class="admin-pay-heading">
      <h2>Vendor QR codes</h2>
      <p>Manage deposit QR images per site</p>
    </div>
    <button
      type="button"
      class="admin-pay-add-btn"
      [disabled]="!selectedSiteId"
      (click)="Add_Admin_QR_Popup()"
    >
      <i class="bi bi-plus-lg" aria-hidden="true"></i>
      Add QR
    </button>
  </header>

  <div class="admin-pay-site-bar">
    <label for="adminQrSite">Site</label>
    <select
      id="adminQrSite"
      class="admin-pay-site-select"
      [disabled]="loadingSites"
      [ngModel]="selectedSiteId"
      (ngModelChange)="onSiteChange($event)"
    >
      <option [ngValue]="null">{{ loadingSites ? 'Loading sites…' : 'Select a site' }}</option>
      <option *ngFor="let site of sites" [ngValue]="site.siteId">{{ site.siteName }}</option>
    </select>
  </div>

  <div class="admin-pay-loading" *ngIf="loadingPayments">
    <div class="spinner-border text-warning" role="status" aria-hidden="true"></div>
    <span>Loading QR codes…</span>
  </div>

  <div class="admin-pay-empty" *ngIf="!loadingPayments && !selectedSiteId">
    <div class="admin-pay-empty-card">
      <div class="admin-pay-empty-icon" aria-hidden="true">
        <i class="bi bi-geo-alt"></i>
      </div>
      <h3>Select a site</h3>
      <p>Choose a site to view or upload vendor QR codes.</p>
    </div>
  </div>

  <div class="admin-pay-empty" *ngIf="!loadingPayments && selectedSiteId && Ibank_details.length === 0">
    <div class="admin-pay-empty-card">
      <div class="admin-pay-empty-icon" aria-hidden="true">
        <i class="bi bi-qr-code"></i>
      </div>
      <h3>No QR codes</h3>
      <p>There are no vendor QR codes for {{ selectedSiteName }} yet.</p>
      <button type="button" class="admin-pay-add-btn" (click)="Add_Admin_QR_Popup()">
        <i class="bi bi-plus-circle-fill" aria-hidden="true"></i>
        Add QR code
      </button>
    </div>
  </div>

  <div class="admin-pay-list" *ngIf="!loadingPayments && Ibank_details.length > 0">
    <article class="admin-pay-card" *ngFor="let bank_detail of Ibank_details">
      <div class="admin-pay-card-header">
        <div class="admin-pay-card-title">
          <button
            type="button"
            class="admin-pay-default-btn"
            *ngIf="!isDefault(bank_detail.isDefault)"
            (click)="Make_Admin_QR_Default(bank_detail)"
            title="Make default"
          >
            <i class="bi bi-patch-plus-fill"></i>
          </button>
          <span class="admin-pay-default-badge" *ngIf="isDefault(bank_detail.isDefault)" title="Default">
            <i class="bi bi-patch-check-fill"></i>
            Default
          </span>
          <h3>{{ bank_detail.accountDisplayName }}</h3>
        </div>
        <button type="button" class="admin-pay-delete-btn" (click)="Delete_Admin_QR(bank_detail)" title="Delete">
          <i class="bi bi-trash3-fill"></i>
        </button>
      </div>

      <div class="admin-pay-card-body">
        <div class="admin-pay-qr">
          <img
            [src]="qrPath + bank_detail.documentDetailId + '.' + bank_detail.fileExtenstion"
            [alt]="bank_detail.accountDisplayName"
          />
        </div>
      </div>
    </article>
  </div>
</section>
