<div class="modal-content siteColor">
    <form (ngSubmit)="Add_User_QR()" [formGroup]="addUserQrForm">
        <div class="modal-header">
            <p class="modal-title">Add QR Code</p>
            <div type="button" class="close" (click)="bsModalRef.hide()">
                <i class="bi bi-x-circle-fill"></i>
            </div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>QR Name</label>
                <input formControlName="QRName" [(ngModel)]="qrName" type="text" class="form-control" placeholder="QR Name" autocomplete="off">
                <div class="text-danger" *ngIf="addUserQrForm.get('QRName')?.invalid && (submitted || addUserQrForm.get('QRName')?.touched || addUserQrForm.get('QRName')?.dirty)">
                 <span *ngIf="addUserQrForm.get('QRName')?.errors?.['required']">QR Name is required</span></div>
            </div>
            <div class="form-group">
                <div method="post" enctype="multipart/form-data" style="margin-top: 10px">
                    <div class="form-group col-12 px-0">
                        <label class="kp-file-upload">
                            <span class="kp-file-upload-ui">
                                <i class="bi bi-cloud-arrow-up kp-file-upload-icon" aria-hidden="true"></i>
                                <span class="kp-file-upload-title">Choose QR image</span>
                                <span class="kp-file-upload-hint">Full width · tap anywhere · JPG or PNG</span>
                                <span class="kp-file-upload-name" *ngIf="selectedFileName">{{ selectedFileName }}</span>
                            </span>
                            <input class="kp-file-upload-input" #imageInput type="file" accept="image/*" (change)="processFile(imageInput)">
                        </label>
                        <div class="text-danger mt-2" *ngIf="!file && submitted">
                            <span>File is required</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="submit" class="btn siteBtnbackground col-12" appSingleClick>Add QR Code</button>
        </div>
    </form>
</div>
