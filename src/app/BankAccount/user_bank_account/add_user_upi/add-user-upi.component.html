<div class="modal-header">
    <p class="modal-title">UPI Detail</p>
    <button type="button" class="close modal-chrome-btn modal-chrome-btn-close" (click)="bsModalRef.hide()" aria-label="Close">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
</div>
<div class="card-header py-4 text-center kp-modal-brand">
    <img src="../../../../assets/kapunter-logo.jpeg" class="modallogosize" alt="Kapunter logo">
    <app-kp-wordmark size="md"></app-kp-wordmark>
</div>

<div class="card-body p-4">
    <form (ngSubmit)="Add_User_Upi()" [formGroup]="addUserUpiForm" autocomplete="off">
        <div class="mb-3 form-group">
            <label for="UpiName" class="form-label">UPI Name*</label>
            <input class="form-control" type="text" formControlName="UpiName" placeholder="UPI Name" autocomplete="off" [(ngModel)]="add_user_upi.userName">
            <div class="text-danger" *ngIf="addUserUpiForm.get('UpiName')?.invalid && (submitted || addUserUpiForm.get('UpiName')?.touched || addUserUpiForm.get('UpiName')?.dirty)">
            <span *ngIf="addUserUpiForm.get('UpiName')?.errors?.['required']">UPI Name is required</span></div>
        </div>

        <div class="mb-3 form-group">
            <label for="UpiId" class="form-label">UPI ID*</label>
            <input class="form-control" type="text" formControlName="UpiId" placeholder="example@upi" autocomplete="off" [(ngModel)]="add_user_upi.upiId">
            <div class="text-danger" *ngIf="addUserUpiForm.get('UpiId')?.invalid && (submitted || addUserUpiForm.get('UpiId')?.touched || addUserUpiForm.get('UpiId')?.dirty)">
            <span *ngIf="addUserUpiForm.get('UpiId')?.errors?.['required']">UPI ID is required</span></div>
        </div>

        <div class="col-12 mb-0 text-center">
            <button class="col-12 btn siteBtnbackground" type="submit" appSingleClick>Add UPI Detail</button>
        </div>
    </form>
</div>
