
        <div class="modal-content siteColor">
            <div class="modal-header">
                <p class="modal-title">Delete</p>
                <button type="button" class="close modal-chrome-btn modal-chrome-btn-close" (click)="bsModalRef.hide()" aria-label="Close">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <p class="mb-3">Are you sure you want to delete {{ title }}?</p>

                    <div *ngIf="requiresDeletionReason" class="deletion-reason-block">
                        <label for="deletionReason" class="form-label">
                            Deletion reason <span class="text-danger">*</span>
                        </label>
                        <textarea
                            id="deletionReason"
                            class="form-control deletion-reason-input"
                            rows="4"
                            maxlength="200"
                            placeholder="Enter why this request is being deleted (required, max 200 characters)"
                            [(ngModel)]="deletionReason"
                            (input)="onDeletionReasonInput()"
                        ></textarea>
                        <div class="deletion-reason-meta">
                            <small class="text-danger" *ngIf="deletionReasonTouched && !deletionReason.trim()">
                                Deletion reason is required.
                            </small>
                            <small class="char-count" [class.text-warning]="remainingChars < 20">
                                {{ remainingChars }} characters remaining
                            </small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn siteBtnbackground" appSingleClick (click)="deleteData()">Confirm Delete</button>
            </div>
        </div>
