<div class="modal-content site-id-details-modal siteColor">
  <div class="modal-header site-id-details-header">
    <div class="site-id-details-heading">
      <p class="modal-title" id="siteIdDetailsTitle">My ID details</p>
      <p class="site-id-details-sub" *ngIf="contextSite?.siteName as name">{{ name }}</p>
    </div>
    <button type="button" class="close modal-chrome-btn modal-chrome-btn-close site-id-details-close" (click)="bsModalRef.hide()" aria-label="Close">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
  </div>
  <div class="modal-body site-id-details-body">
    <div class="site-id-details-loading" *ngIf="loading">
      <app-kapunter-loader message="Loading credentials…"></app-kapunter-loader>
    </div>

    <div class="site-id-details-empty" *ngIf="!loading && ids.length === 0">
      <i class="bi bi-person-x" aria-hidden="true"></i>
      <p>No ID on this platform yet. Use <strong>Create ID</strong> to add one.</p>
    </div>

    <ul class="site-id-details-list" *ngIf="!loading && ids.length > 0" aria-labelledby="siteIdDetailsTitle">
      <li *ngFor="let row of ids; trackBy: trackById" class="site-id-details-card">
        <div class="site-id-details-card-top">
          <div class="site-logo-frame" [class.site-logo-frame-empty]="!siteLogoUrl(row.documentDetailId, row.fileExtenstion)">
            <img
              *ngIf="siteLogoUrl(row.documentDetailId, row.fileExtenstion) as logoUrl"
              class="site-logo-img"
              [src]="logoUrl"
              [alt]="row.siteName || 'Site'"
              loading="lazy"
              decoding="async"
              (error)="onLogoError($event)"
            />
            <i *ngIf="!siteLogoUrl(row.documentDetailId, row.fileExtenstion)" class="bi bi-globe2 site-logo-fallback" aria-hidden="true"></i>
          </div>
          <div class="site-id-details-card-meta">
            <span class="site-id-details-platform">{{ row.siteName }}</span>
            <span class="site-id-details-number">ID #{{ row.userNumber }}</span>
          </div>
        </div>

        <div class="site-id-details-fields">
          <div class="site-id-details-field">
            <label>Username</label>
            <div class="site-id-details-value-row">
              <span class="site-id-details-value">{{ row.userName || '—' }}</span>
            </div>
          </div>
          <div class="site-id-details-field">
            <label>Password</label>
            <div class="site-id-details-secret-row">
              <input
                class="site-id-details-input"
                readonly
                [type]="isPasswordRevealed(row) ? 'text' : 'password'"
                [value]="row.password || '—'"
              />
              <button
                type="button"
                class="site-id-details-reveal"
                (click)="togglePasswordReveal(row)"
                [attr.aria-pressed]="isPasswordRevealed(row)"
                [attr.aria-label]="isPasswordRevealed(row) ? 'Hide password' : 'Show password'"
              >
                <i class="bi" [class.bi-eye]="!isPasswordRevealed(row)" [class.bi-eye-slash]="isPasswordRevealed(row)"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="site-id-details-close-box" *ngIf="!isClosing(row)">
          <button type="button" class="btn btn-sm site-id-close-btn" (click)="startClose(row)">
            <i class="bi bi-x-circle"></i> Request close ID
          </button>
        </div>

        <div class="site-id-details-close-form" *ngIf="isClosing(row)">
          <label>Why do you want to close this ID?</label>
          <textarea class="form-control" rows="3" [(ngModel)]="closeReason" maxlength="500" placeholder="Enter reason for admin approval"></textarea>
          <div class="site-id-close-actions">
            <button type="button" class="btn btn-sm siteBtnbackground" appSingleClick [disabled]="closeSubmitting" (click)="submitClose(row)">
              {{ closeSubmitting ? 'Submitting…' : 'Submit request' }}
            </button>
            <button type="button" class="btn btn-sm site-id-close-cancel" [disabled]="closeSubmitting" (click)="cancelClose()">Cancel</button>
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>
