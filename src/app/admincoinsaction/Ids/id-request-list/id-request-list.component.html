
<div class="col-12 text-center listtypeview admin-list-header">
    <p class="text-uppercase mb-1">Account Requests Sent</p>
    <p class="list-subtitle">Pending ID creation requests from users</p>
</div>

<div class="mt-4">
<div class="customtable admin-list-table">
    <table class="table table-hover scrollbar" id="idRequestList">
        <thead>
        <tr class="tableHeaderClass">
            <th scope="col"><p>User</p></th>
            <th scope="col"><p>Application</p></th>
            <th scope="col"><p>Requested ID</p></th>
            <th scope="col"><p>Requested Date</p></th>
            <th scope="col"><p>Action</p></th>
        </tr>
        </thead>
        <tbody>
            <tr *ngIf="!idRequestList.length">
                <td colspan="5" class="admin-list-empty">
                    <i class="bi bi-inbox"></i>
                    <p class="mb-0">No pending account requests.</p>
                </td>
            </tr>
            <tr *ngFor="let ids of idRequestList">
                <th scope="row" data-label="User">
                    <span class="list-cell-user">{{ ids.userNumber }}</span>
                </th>
                <td data-label="Application">
                    <div class="site-cell">
                        <div class="site-logo-frame" [class.site-logo-frame-empty]="!ids.documentDetailId">
                            <img
                                *ngIf="ids.documentDetailId"
                                class="site-logo-img"
                                [src]="sitePath + ids.documentDetailId + ids.fileExtenstion"
                                [alt]="ids.siteName"
                                loading="lazy"
                                decoding="async" />
                            <i *ngIf="!ids.documentDetailId" class="bi bi-globe2 site-logo-fallback" aria-hidden="true"></i>
                        </div>
                        <div class="site-meta">
                            <p>{{ ids.siteName }}</p>
                            <p class="site-url">{{ ids.siteURL }}</p>
                        </div>
                    </div>
                </td>
                <td data-label="Requested ID"><span class="id-badge">{{ ids.userName }}</span></td>
                <td data-label="Requested Date"><span class="list-cell-date">{{ ids.createdDate }}</span></td>
                <td data-label="Action">
                    <div class="action-btn-group btn-group">
                        <button type="button" title="Create ID" (click)="CreateIDPopup(ids)">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button type="button" title="Delete request" (click)="DeleteIDRequest(ids)">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</div>
<div class="pagination" *ngIf="paginationCount > 1">
    <a (click)="PaginationNumber(1)">&laquo;</a>
    <span *ngFor="let pagination of getCountArray()">
        <a (click)="PaginationNumber(pagination + 1)">{{ pagination + 1 }}</a>
    </span>
    <a (click)="PaginationNumber(paginationCount)">&raquo;</a>
</div>
