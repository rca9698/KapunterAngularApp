<div class="col-12 text-center listtypeview admin-list-header">
  <p class="text-uppercase mb-1">Created Accounts</p>
  <p class="list-subtitle">Active user IDs across applications</p>
</div>

<div class="mt-4">
  <div class="customtable admin-list-table">
    <table class="table table-hover scrollbar" id="createdIdsList">
      <thead>
        <tr class="tableHeaderClass">
          <th scope="col"><p>User</p></th>
          <th scope="col"><p>Application</p></th>
          <th scope="col"><p>ID Username</p></th>
          <th scope="col"><p>Created Date</p></th>
          <th scope="col"><p>Action</p></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="!idList.length">
          <td colspan="5" class="admin-list-empty">
            <i class="bi bi-inbox"></i>
            <p class="mb-0">No accounts found.</p>
          </td>
        </tr>
        <tr *ngFor="let id of idList">
          <th scope="row" data-label="User"><span class="list-cell-user">{{ id.userNumber }}</span></th>
          <td data-label="Application">
            <div class="site-cell">
              <div class="site-logo-frame" [class.site-logo-frame-empty]="!id.documentDetailId">
                <img
                  *ngIf="id.documentDetailId"
                  class="site-logo-img"
                  [src]="sitePath + id.documentDetailId + id.fileExtenstion"
                  [alt]="id.siteName"
                  loading="lazy"
                  decoding="async" />
                <i *ngIf="!id.documentDetailId" class="bi bi-globe2 site-logo-fallback" aria-hidden="true"></i>
              </div>
              <div class="site-meta">
                <p>{{ id.siteName }}</p>
                <p class="site-url">{{ id.siteURL }}</p>
              </div>
            </div>
          </td>
          <td data-label="ID Username"><span class="id-badge">{{ id.userName }}</span></td>
          <td data-label="Created Date"><span class="list-cell-date">{{ id.createdDate }}</span></td>
          <td data-label="Action">
            <div class="action-btn-group btn-group">
              <button type="button" title="Delete account" (click)="DeleteID(id)">
                <i class="bi bi-trash-fill"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="pagination" *ngIf="paginationCount > 1">
  <a (click)="PaginationNumber(1)">&laquo;</a>
  <span *ngFor="let pagination of getCountArray()">
    <a (click)="PaginationNumber(pagination + 1)">{{ pagination + 1 }}</a>
  </span>
  <a (click)="PaginationNumber(paginationCount)">&raquo;</a>
</div>
