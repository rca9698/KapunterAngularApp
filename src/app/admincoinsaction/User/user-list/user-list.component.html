
<div class="col-12 text-center listtypeview admin-list-header">
    <p class="text-uppercase mb-1">User Listing</p>
    <p class="list-subtitle">Active registered users and wallet balances</p>
</div>

<div class="mt-4">
<div class="customtable admin-list-table">
    <table class="table table-hover scrollbar" id="userList">
        <thead>
        <tr class="tableHeaderClass">
            <th scope="col"><p>User Number</p></th>
            <th scope="col"><p>Created Date</p></th>
            <th scope="col"><p>Coins (<i class="bi bi-currency-rupee"></i>)</p></th>
            <th scope="col"><p>Action</p></th>
        </tr>
        </thead>
        <tbody>
            <tr *ngIf="!usersList.length">
                <td colspan="6" class="admin-list-empty">
                    <i class="bi bi-inbox"></i>
                    <p class="mb-0">No users found.</p>
                </td>
            </tr>
            <tr *ngFor="let user of usersList">
                <th scope="row" data-label="User Number">
                    <button type="button" class="user-number-link list-cell-user" (click)="viewUserSiteAccounts(user)" title="View site IDs and transaction history">
                        {{ user.userNumber }}
                    </button>
                </th>
                <td data-label="Created Date"><span class="list-cell-date">{{ user.createdDate }}</span></td>
                <td data-label="Coins"><span class="coins-amount"><i class="bi bi-currency-rupee"></i>{{ user.coins }}</span></td>
                <td data-label="Action">
                    <div class="action-btn-group btn-group">
                        <!--<button type="button" title="Deposit coins" (click)="depositeCoinsByUserId(user)">
                            <i class="bi bi-person-fill-up"></i>
                        </button>
                        <button type="button" title="Withdraw coins" (click)="withdrawCoinsByUserId(user)">
                            <i class="bi bi-person-fill-down"></i>
                        </button>-->
                        <button type="button" title="Delete user" (click)="deleteUser(user)">
                            <i class="bi bi-person-fill-slash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</div>
<div class="pagination" *ngIf="paginationCount > 1">
    <a [class.disabled]="!hasPreviousPage()"
       (click)="goToPreviousPage()"
       [style.cursor]="hasPreviousPage() ? 'pointer' : 'default'"
       [style.opacity]="hasPreviousPage() ? '1' : '0.5'">&laquo;</a>
    <span *ngFor="let pagination of getCountArray()">
        <a [class.active]="isActivePage(pagination)"
           (click)="PaginationNumber(pagination)">
            {{ pagination + 1 }}
        </a>
    </span>
    <a [class.disabled]="!hasNextPage()"
       (click)="goToNextPage()"
       [style.cursor]="hasNextPage() ? 'pointer' : 'default'"
       [style.opacity]="hasNextPage() ? '1' : '0.5'">&raquo;</a>
</div>
