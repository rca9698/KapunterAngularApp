<form (ngSubmit)="WithdrawCoinsToIds()" [formGroup]="withdrawCoinsfromidsFrom">
    <div class="modal-header">
        <p class="modal-title" id="exampleModalLabel">Withdraw Coins From ID</p>
        <div type="button" class="close" aria-label="Close" (click)="bsModalRef.hide()">
            <i class="bi bi-x-circle-fill"></i>
        </div>
    </div>
    <div class="modal-body">
        <div class="form-group col-12">
            <div class="d-flex flex-column text-center col-12 modal-site-profile">
                <span>
                    <img class="siteIcon rounded-circle siteImageSize" src="{{sitePath}}{{obj.documentDetailId}}{{obj.fileExtenstion}}" />
                </span>
                <p class="text-uppercase">{{obj.siteName}}</p>
                <p>{{obj.siteURL}}</p>
                <p *ngIf="obj.userName">User: {{obj.userName}}</p>
                <p>Account ID: {{ obj.accountUserName || obj.userName || obj.accountId || obj.accountID }}</p>
            </div>
        </div>
        <div class="form-group">
            <label>Coins(<i class="bi bi-currency-rupee"></i>)*</label>
            <input type="text" formControlName="coins" class="form-control" placeholder="coins" [(ngModel)]="obj.coins" autocomplete="off">
            <div class="text-danger" *ngIf="withdrawCoinsfromidsFrom.get('coins')?.invalid && (submitted || withdrawCoinsfromidsFrom.get('coins')?.touched || withdrawCoinsfromidsFrom.get('coins')?.dirty)">
            <span *ngIf="withdrawCoinsfromidsFrom.get('coins')?.errors?.['required']"> coins are is required </span> </div>
            </div>
        <div class="form-group">
            <label>UTR (bank reference)*</label>
            <input type="text" formControlName="utr" class="form-control" placeholder="Enter UTR number" autocomplete="off">
            <div class="text-danger" *ngIf="withdrawCoinsfromidsFrom.get('utr')?.invalid && (submitted || withdrawCoinsfromidsFrom.get('utr')?.touched || withdrawCoinsfromidsFrom.get('utr')?.dirty)">
                <span *ngIf="withdrawCoinsfromidsFrom.get('utr')?.errors?.['required']">UTR is required</span>
                <span *ngIf="withdrawCoinsfromidsFrom.get('utr')?.errors?.['minlength']">Enter a valid UTR</span>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="submit" class="btn siteBtnbackground col-12" appSingleClick>Withdraw Coins From ID</button>
    </div>
</form>
