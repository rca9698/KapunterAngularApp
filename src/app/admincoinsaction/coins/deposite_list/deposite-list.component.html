
<div class="col-12 text-center listtypeview coins-list-header">
    <p class="text-uppercase mb-1">Wallet Deposit</p>
    <p class="list-subtitle">Pending deposits to user wallet</p>
</div>

<div class="mt-4">
<div class="customtable coins-list-table">
    <table class="table table-hover scrollbar" id="walletDepositList">
        <thead>
        <tr class="tableHeaderClass">
            <th scope="col"><p>User Number</p></th>
            <th scope="col"><p>User Name</p></th>
            <th scope="col"><p>Coins</p></th>
            <th scope="col"><p>Request Date</p></th>
            <th scope="col"><p>Action</p></th>
        </tr>
        </thead>
        <tbody>
            <tr *ngIf="!requestList?.length">
                <td colspan="5" class="coins-list-empty">
                    <i class="bi bi-inbox"></i>
                    <p class="mb-0">No pending wallet deposit requests.</p>
                </td>
            </tr>
            <tr *ngFor="let request of requestList">
                <th scope="row" data-label="User Number"><span class="list-cell-user">{{ request.userNumber }}</span></th>
                <td data-label="User Name"><span class="list-cell-user">{{ request.userName }}</span></td>
                <td data-label="Coins"><span class="coins-amount"><i class="bi bi-currency-rupee"></i>{{ request.coins }}</span></td>
                <td data-label="Request Date"><span class="list-cell-date">{{ request.createdDate }}</span></td>
                <td data-label="Action">
                    <div class="action-btn-group btn-group">
                        <button type="button" title="View payment proof" (click)="ViewCoinRequestProof(request)">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                        <button type="button" title="Approve deposit" (click)="DepositCoinsPopup(request)">
                            <i class="bi bi-person-fill-up"></i>
                        </button>
                        <button type="button" title="Delete request" (click)="DeleteCoinRequestPopup(request)">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</div>
<div class="pagination" *ngIf="paginationCount > 1">
    <a (click)="PaginationNumber(0)" p-id="previous">&laquo;</a>
    <span *ngFor="let pagination of getCountArray()">
        <a (click)="PaginationNumber(pagination)">{{ pagination + 1 }}</a>
    </span>
    <a (click)="PaginationNumber(paginationCount - 1)" p-id="next">&raquo;</a>
</div>
