
<div class="dashboard-content home-dashboard">
  <div id="DashboardImageSlides" class="carousel slide home-carousel" data-bs-ride="carousel" *ngIf="images.length > 0">
    <div class="carousel-inner">
      <div class="carousel-item" [ngClass]="{ active: i === 0 }" data-bs-interval="10000" *ngFor="let image of images; let i = index">
        <img src="{{ imgPath }}{{ image.documentDetailId }}{{ image.fileExtenstion }}" class="d-block w-100" alt="">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#DashboardImageSlides" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#DashboardImageSlides" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>

  <section class="home-account-section account-sites-section" *ngIf="authservice.isLoggenIn | async">

    <div class="loading-container" *ngIf="sitesLoading">
      <app-kapunter-loader message="Loading sites…"></app-kapunter-loader>
    </div>

    <div
      #accountCarousel
      id="DashboardAccountSlides"
      class="carousel slide home-account-carousel"
      data-bs-interval="10000"
      data-bs-pause="hover"
      *ngIf="!sitesLoading && sites.length > 0">
      <div class="carousel-indicators home-account-indicators" *ngIf="sites.length > 1">
        <button
          type="button"
          *ngFor="let site of sites; let i = index; trackBy: trackBySiteId"
          data-bs-target="#DashboardAccountSlides"
          [attr.data-bs-slide-to]="i"
          [class.active]="i === 0"
          [attr.aria-current]="i === 0 ? 'true' : null"
          [attr.aria-label]="'Account ' + (i + 1)">
        </button>
      </div>

      <div class="carousel-inner">
        <div
          class="carousel-item"
          [class.active]="i === 0"
          *ngFor="let site of sites; let i = index; trackBy: trackBySiteId">
          <article class="site-card home-account-slide">
            <div class="site-card-row site-card-row-top">
              <div class="site-card-brand" (click)="openSiteLink(site)">
                <div class="site-logo-wrap">
                  <img class="siteImageSize" [src]="sitePath + site.documentDetailId + site.fileExtenstion" [alt]="site.siteName" />
                </div>
                <div class="site-meta">
                  <h3 class="site-name">{{ site.siteName }} (User Name: {{site.userName}})</h3>
                  <p class="site-url">{{ site.siteURL }}</p>
                  <p class="site-trust"><i class="bi bi-shield-check"></i> Trusted &amp; secure · Instant payouts</p>
                </div>
              </div>
              <div class="site-card-status">
                <span class="site-status-dot"></span>
                <span>Active</span>
              </div>
              <button type="button" class="site-card-chevron" (click)="openSiteLink(site)" aria-label="Open site">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>

            <div class="site-actions-grid">
              <button type="button" class="site-action site-action-create" (click)="CreateIDRequest(site)">
                <i class="bi bi-person-plus-fill"></i><span>Create ID</span>
              </button>
              <button type="button" class="site-action site-action-deposit" (click)="openDepositeCoinsRequest(site)">
                <i class="bi bi-arrow-down-circle"></i><span>Deposit</span>
              </button>
              <button type="button" class="site-action site-action-withdraw" (click)="openWithdrawCoinsRequest(site)">
                <i class="bi bi-arrow-up-circle"></i><span>Withdraw</span>
              </button>
              <button type="button" class="site-action site-action-transfer" (click)="openTransferIdsList(site)">
                <i class="bi bi-arrow-left-right"></i><span>Transfer</span>
              </button>
              <button type="button" class="site-action site-action-details" (click)="openSiteIdDetails(site)">
                <i class="bi bi-person-vcard"></i><span>My ID details</span>
              </button>
              <button type="button" class="site-action site-action-link" (click)="openTransactionHistoryDetails(site)">
                <i class="bi bi-box-arrow-up-right"></i><span>Transaction History</span>
              </button>
            </div>
          </article>
        </div>
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#DashboardAccountSlides" data-bs-slide="prev" *ngIf="sites.length > 1">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#DashboardAccountSlides" data-bs-slide="next" *ngIf="sites.length > 1">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </section>
</div>
