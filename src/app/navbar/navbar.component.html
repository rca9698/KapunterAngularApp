<header class="dashboard-toolbar sitebackground navbar-shell">
  <div class="navbar-toolbar-row">
    <div class="navbar-leading-actions">
      <a class="menu-toggle" role="button" tabindex="0" aria-label="Open menu">
        <i class="bi bi-list"></i>
      </a>
      <button
        type="button"
        class="theme-toggle-btn"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.current === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
        [attr.title]="themeService.current === 'dark' ? 'Light mode' : 'Dark mode'"
      >
        <i class="bi" [ngClass]="themeService.current === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill'"></i>
      </button>
    </div>

    <div class="navbar-brand-center">
      <button
        type="button"
        class="navbar-kp-wordmark-btn"
        (click)="RedirectToHome()"
        aria-label="Kapunter home">
        <app-kp-wordmark size="nav"></app-kp-wordmark>
      </button>
    </div>

    <nav class="navbar-auth-cluster" aria-label="Account actions">
      <button
        type="button"
        class="nav-get-app-btn"
        *ngIf="!isNativeApp"
        (click)="downloadAndroidApp()"
        title="Download Kapunter for Android"
        aria-label="Download Kapunter for Android">
        <i class="bi bi-phone" aria-hidden="true"></i>
        <span>Get App</span>
      </button>
      <ng-container *ngIf="!(authservice.isLoggenIn | async)">
        <button type="button" class="btn siteBtnbackground nav-pill-btn nav-pill-tight" tabindex="0" (click)="loginPopup()">
          Login &nbsp;|&nbsp; Signup
        </button>
      </ng-container>
      <ng-container *ngIf="(authservice.isLoggenIn | async)">
        <button
          type="button"
          class="nav-user-chip"
          tabindex="0"
          (click)="goToMyAccount()"
          [attr.title]="'My Account · ' + authservice.displayUserNumber"
          [attr.aria-label]="'My Account, user number ' + authservice.displayUserNumber"
        >
          <i class="bi bi-person-circle" aria-hidden="true"></i>
          <span class="nav-user-chip-meta">
            <span class="nav-user-chip-label">Account</span>
            <strong class="nav-user-chip-number">{{ authservice.displayUserNumber }}</strong>
          </span>
        </button>
        <button type="button" class="btn siteBtnbackground nav-pill-btn nav-pill-tight nav-pill-logout" tabindex="0" (click)="logout()">Logout</button>
      </ng-container>
    </nav>
  </div>

  <div
    class="visitor-counter-bar"
    *ngIf="visitorCountService.stats$ | async as liveStats"
    aria-live="polite"
    aria-label="Platform login and active session statistics"
  >
    <div class="visitor-counter-bar-glow" aria-hidden="true"></div>
    <div class="visitor-counter-icon" aria-hidden="true">
      <i class="bi bi-people-fill"></i>
      <span class="visitor-live-dot"></span>
    </div>
    <div class="visitor-counter-copy">
      <span class="visitor-counter-label">Total logins</span>
      <strong class="visitor-counter-value">{{ formatCount(displayTotal) }}</strong>
    </div>
    <div class="visitor-counter-trend">
      <i class="bi bi-broadcast" aria-hidden="true"></i>
      <span>{{ formatCount(liveStats.activeSessions) }} active sessions currently</span>
      <span class="visitor-counter-sep" aria-hidden="true">·</span>
    </div>
  </div>
</header>
