<section class="kp-content-shell notification-shell">
  <div class="kp-content-card">
    <header class="notification-header">
      <div>
        <h1>Notifications</h1>
        <p class="kp-content-lead">Passbook activity, request decisions, announcements, and mobile app updates.</p>
      </div>
      <button
        type="button"
        class="notification-read-all"
        *ngIf="notifications.unreadCount > 0"
        (click)="notifications.markAllAsRead()">
        Mark all read
      </button>
    </header>

    <ng-container *ngIf="notifications.items$ | async as items">
      <div class="notification-timeline" *ngIf="items.length; else emptyNotifications">
        <button
          type="button"
          class="notification-item"
          *ngFor="let item of items"
          [class.is-unread]="item.unread"
          [attr.data-source]="item.source"
          (click)="open(item)">
          <span class="notification-icon" aria-hidden="true">
            <i [class]="'bi ' + icon(item)"></i>
          </span>
          <span class="notification-content">
            <span class="notification-title-row">
              <strong>{{ item.title }}</strong>
              <em *ngIf="item.unread">New</em>
            </span>
            <small *ngIf="item.subtitle">{{ item.subtitle }}</small>
            <span *ngIf="item.detail" class="notification-detail">{{ item.detail }}</span>
            <time *ngIf="item.whenLabel" class="notification-when">{{ item.whenLabel }}</time>
            <b *ngIf="item.amountLabel">{{ item.amountLabel }}</b>
          </span>
          <i
            class="bi bi-chevron-right notification-go"
            *ngIf="item.source === 'passbook' || item.source === 'app-update'"
            aria-hidden="true"></i>
        </button>
      </div>
      <ng-template #emptyNotifications>
        <div class="notification-empty">
          <i class="bi bi-bell-check" aria-hidden="true"></i>
          <h2>You are all caught up</h2>
          <p>New passbook updates, announcements, and application notices will appear here.</p>
        </div>
      </ng-template>
    </ng-container>
  </div>
</section>
