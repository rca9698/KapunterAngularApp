<section class="kp-content-shell">
  <div class="kp-content-card">
    <h1>Exclusive offers</h1>
    <p class="kp-content-lead">Offers designed for faster payouts and better rewards.</p>

    <article class="kp-offer-block" [ngClass]="'kp-offer-accent-' + offer.cardType" *ngFor="let offer of offers">
      <div class="kp-offer-block-header">
        <h2>{{ offer.emoji }} {{ offer.title }}</h2>
      </div>
      <div class="kp-offer-block-body">
        <p class="headline">{{ offer.headline }}</p>
        <p class="desc">{{ offer.description }}</p>
        <ul *ngIf="offer.benefits?.length">
          <li *ngFor="let benefit of offer.benefits">{{ benefit }}</li>
        </ul>
        <div class="kp-rule-box" *ngFor="let rule of offer.rules || []">
          <strong>{{ rule.title }}</strong>
          <p>{{ rule.content }}</p>
        </div>
        <p class="kp-terms-note" *ngIf="offer.terms">{{ offer.terms }}</p>
      </div>
    </article>
  </div>
</section>
