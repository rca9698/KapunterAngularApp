<div class="modal-content create-id-modal">
  <form (ngSubmit)="AddUserId()" [formGroup]="AddIdsFrom">
    <div class="create-id-header">
      <div class="create-id-site">
        <img
          *ngIf="obj?.documentDetailId"
          class="create-id-logo"
          [src]="sitePath + obj?.documentDetailId + obj?.fileExtenstion"
          [alt]="obj?.siteName"
        />
        <div>
          <p class="create-id-eyebrow">Create ID</p>
          <h2>{{ obj?.siteName }}</h2>
          <p class="create-id-url">{{ obj?.siteURL }}</p>
        </div>
      </div>
      <button type="button" class="create-id-close" (click)="bsModalRef.hide()" aria-label="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="create-id-body">
      <p class="create-id-help">Choose the username you want on this platform. One active ID per site.</p>
      <label for="createIdUsername">User name</label>
      <input
        id="createIdUsername"
        formControlName="username"
        type="text"
        class="form-control"
        placeholder="Enter preferred username"
        autocomplete="off"
      />
      <div
        class="create-id-error"
        *ngIf="AddIdsFrom.get('username')?.invalid && (submitted || AddIdsFrom.get('username')?.touched || AddIdsFrom.get('username')?.dirty)">
        <span *ngIf="AddIdsFrom.get('username')?.errors?.['required']">User name is required</span>
      </div>
    </div>

    <div class="create-id-footer">
      <button type="button" class="btn create-id-cancel" (click)="bsModalRef.hide()">Cancel</button>
      <button type="submit" class="btn siteBtnbackground create-id-submit" appSingleClick>Create ID</button>
    </div>
  </form>
</div>
