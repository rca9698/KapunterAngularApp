<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('kapunter-theme');
        document.documentElement.setAttribute(
          'data-kp-theme',
          theme === 'light' || theme === 'dark' ? theme : 'dark'
        );
      } catch (e) {
        document.documentElement.setAttribute('data-kp-theme', 'dark');
      }
    })();
  </script>
  <script>
    (function () {
      var host = window.location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1';
      if (!isLocal && window.location.protocol === 'http:') {
        window.location.replace(
          'https://' + window.location.host + window.location.pathname + window.location.search + window.location.hash
        );
      }
    })();
  </script>
  <title>KAPunter</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="kapunter-logo.jpeg">
